# Clash Verge 自动选择配置
# 基于你的实际节点生成
# 保存为: ~/clash-verge-auto.yaml

proxy-groups:
  # 🚀 自动选择最优节点（10分钟测试一次）
  - name: "🚀 自动选择-香港优先"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600        # 10分钟
    tolerance: 30        # 30ms容差
    lazy: true
    proxies:
      - "香港-IPLC-HK-4"
      - "香港-IPLC-HK-3"
      - "香港-IPLC-HK-5"
      - "香港-IPLC-HK-2"
      - "香港-IPLC-HK-1"
      - "香港-HK-2"
      - "香港-HK-1"
      - "日本-TY-2"
      - "日本-TY-3"
      - "日本-TY-4"
      - "日本-TY-1"
      - "新加坡-SG-2"
      - "新加坡-SG-1"
      
  # 🇯🇵 日本专线
  - name: "🇯🇵 日本节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    proxies:
      - "日本-TY-2"
      - "日本-TY-3"
      - "日本-TY-4"
      - "日本-TY-1"
      - "日本-OS-1"
      - "日本-OS-2"
      - "日本-FW-JP1"
      - "日本-FW-JP2"
      
  # 🇸🇬 新加坡节点
  - name: "🇸🇬 新加坡节点"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    proxies:
      - "新加坡-SG-2"
      - "新加坡-SG-1"
      
  # 🌐 全球自动（所有节点）
  - name: "🌐 全球自动"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    # 包含所有延迟<200ms的节点
    proxies:
      - "香港-IPLC-HK-4"
      - "香港-IPLC-HK-3"
      - "香港-IPLC-HK-5"
      - "香港-IPLC-HK-2"
      - "香港-IPLC-HK-1"
      - "香港-IPLC-HK-6"
      - "香港-HK-2"
      - "香港-HK-1"
      - "台湾-TW-1"
      - "台湾-TW-2"
      - "日本-TY-1"
      - "日本-TY-2"
      - "日本-TY-3"
      - "日本-TY-4"
      - "日本-TY-5"
      - "日本-OS-1"
      - "日本-OS-2"
      - "新加坡-SG-1"
      - "新加坡-SG-2"
      - "德国-DE-2"
      - "德国-DE-3"
      - "美国-US-2"
      - "美国-US-3"
      - "英国-UK-1"
      - "荷兰-NL-1"
      - "荷兰-NL-2"
      - "荷兰-NL-3"
      - "荷兰-NL-4"

  # 📍 手动选择（所有节点）
  - name: "📍 手动选择"
    type: select
    proxies:
      - "🚀 自动选择-香港优先"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "🌐 全球自动"
      - "DIRECT"
      # 所有具体节点...
      
  # 🎯 默认全局代理
  - name: "GLOBAL"
    type: select
    proxies:
      - "🚀 自动选择-香港优先"
      - "🇯🇵 日本节点"
      - "🌐 全球自动"
      - "📍 手动选择"
      - "DIRECT"

# 分流规则
rules:
  # 国内直连
  - GEOIP,CN,DIRECT
  
  # 国外走自动选择
  - MATCH,🚀 自动选择-香港优先
